name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build / test / fmt / clippy / doc
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Catches doc drift, e.g. public docs linking to private items.
      # No --document-private-items: that would suppress private-intra-doc-link errors.
      - name: Docs (warnings denied)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Tests
        run: cargo test --workspace

      - name: Build (release)
        run: cargo build --workspace --release

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cargo-deny invokes `cargo metadata`, so a toolchain must be present.
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      # Pinned to the same cargo-deny version verified locally, so the deny.toml
      # schema cannot be rejected by a drifted CLI (see ci-deploy-patterns).
      - name: Install cargo-deny (pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.8

      # --all-features so optional feature trees (e.g. the `llama` FFI provider's
      # llama-cpp-2 dependency) are actually scanned, not skipped. This reads
      # cargo metadata only — it does NOT build llama.cpp's C++.
      - name: License / advisory / bans / sources check
        run: cargo deny --all-features check

  # Compile-checks the optional `llama` FFI provider so it cannot rot unnoticed
  # (the default jobs above deliberately keep llama.cpp's C++ out). ubuntu-only
  # (cheapest) and cached — the heavy llama-cpp-sys-2 C++ build only re-runs when
  # the dependency tree changes; otherwise this is a fast `cargo check`.
  llama-feature:
    name: llama feature (FFI) compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cmake (llama.cpp build dependency)
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check the llama-feature path (provider + CLI selection)
        run: |
          cargo check -p enshell-llama --features llama
          cargo check -p enshell-cli --features llama

      - name: Clippy the llama-feature path
        run: |
          cargo clippy -p enshell-llama --features llama -- -D warnings
          cargo clippy -p enshell-cli --features llama -- -D warnings
