name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build / test / fmt / clippy / doc
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Catches doc drift, e.g. public docs linking to private items.
      # No --document-private-items: that would suppress private-intra-doc-link errors.
      - name: Docs (warnings denied)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Tests
        run: cargo test --workspace

      - name: Build (release)
        run: cargo build --workspace --release

  # Windows is compile + clippy only (no test run). The build matrix above runs
  # the full suite on ubuntu/macOS; on Windows some `enshell-os` execution tests
  # spawn shell builtins (echo/true/cat) that behave differently under cmd.exe.
  # The Windows *render* logic itself is unit-tested on every job (the adapter
  # tests pass `Os::Windows` as a value, host-independently), so this job's role
  # is to catch Windows-specific compile/clippy breaks in the newly-added Windows
  # adapter arms. Default features only — the `llama` C++ build stays out, so no
  # cmake is needed (bundled SQLite builds via the runner's MSVC toolchain).
  windows-build:
    name: windows build (compile + clippy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # --all-targets so the test modules (which reference Os::Windows) are
      # type-checked on Windows too, even though they are not executed here.
      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # cargo-deny invokes `cargo metadata`, so a toolchain must be present.
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      # Pinned to the same cargo-deny version verified locally, so the deny.toml
      # schema cannot be rejected by a drifted CLI (see ci-deploy-patterns).
      - name: Install cargo-deny (pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.8

      # --all-features so optional feature trees (e.g. the `llama` FFI provider's
      # llama-cpp-2 dependency) are actually scanned, not skipped. This reads
      # cargo metadata only — it does NOT build llama.cpp's C++.
      - name: License / advisory / bans / sources check
        run: cargo deny --all-features check

  # Generates a machine-readable CycloneDX SBOM and publishes it as a build
  # artifact (downloadable from the run; ready to attach to future releases).
  # cargo-cyclonedx reads Cargo.lock + `cargo metadata` only — no build, no cmake.
  # Default features: the SBOM describes the C-free binary that ships by default;
  # the optional `llama` feature's extra Rust deps are license/advisory-scanned by
  # the cargo-deny job above (--all-features). Pinned tool version per ci-deploy.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx (pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx@0.5.9

      # One CycloneDX 1.5 JSON SBOM per workspace crate (named <crate>.cdx.json
      # in each crate dir); collect them into sbom/. enshell-cli.cdx.json carries
      # the full dependency tree of the shipped `enshell` binary.
      - name: Generate CycloneDX SBOMs
        run: |
          cargo cyclonedx -f json --spec-version 1.5
          mkdir -p sbom
          find crates -name '*.cdx.json' -exec mv {} sbom/ \;
          ls -l sbom/

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom/*.cdx.json
          if-no-files-found: error

  # Compile-checks the optional `llama` FFI provider so it cannot rot unnoticed
  # (the default jobs above deliberately keep llama.cpp's C++ out). ubuntu-only
  # (cheapest) and cached — the heavy llama-cpp-sys-2 C++ build only re-runs when
  # the dependency tree changes; otherwise this is a fast `cargo check`.
  llama-feature:
    name: llama feature (FFI) compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cmake (llama.cpp build dependency)
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check the llama-feature path (provider + CLI selection + eval)
        run: |
          cargo check -p enshell-llama --features llama
          cargo check -p enshell-cli --features llama
          cargo check -p enshell-eval --features llama

      - name: Clippy the llama-feature path
        run: |
          cargo clippy -p enshell-llama --features llama -- -D warnings
          cargo clippy -p enshell-cli --features llama -- -D warnings
          cargo clippy -p enshell-eval --features llama -- -D warnings
